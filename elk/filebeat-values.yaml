# Valores de exemplo para instalação do Filebeat via Helm (envio direto para Elasticsearch)
daemonset:
  enabled: true

filebeatConfig:
  filebeat.yml: |
    filebeat.inputs:
    - type: container
      paths:
        - /var/log/containers/*.log

    processors:
      - add_kubernetes_metadata: {}

    # send logs to Logstash (beats input)
    output.logstash:
      hosts: ["logstash-logstash:5044"]

    # include env field for index naming
    fields_under_root: true
    fields:
      env: "staging"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 512Mi
