input {
  beats {
    port => 5044
  }
}

filter {
  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{DATA:endpoint} latency=%{NUMBER:latency}ms(?: status=%{INT:status_code})?(?: %{GREEDYDATA:rest})?"
    }
    overwrite => ["message"]
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
    remove_field => ["timestamp"]
  }

  mutate {
    convert => { "latency" => "float" }
  }
}

output {
  elasticsearch {
    hosts => ["https://elasticsearch-master:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ssl => true
    ssl_certificate_verification => false
    index => "app-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}