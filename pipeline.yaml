name: SRE Pipeline CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  IMAGE_NAME: sre-demo
  IMAGE_TAG: latest

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dockerfile Lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  build-push-deploy:
    name: 🔨 Build, 📤 Push & 🚀 Deploy
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ==========================================
      # ETAPA 1: BUILD
      # ==========================================
      - name: 🔨 Build Image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      # ==========================================
      # ETAPA 2: PUSH
      # Obs: O Push para o GitHub Container Registry (GHCR) usa o token nativo 
      # do GitHub sem você precisar configurar variables/secrets manualmente!
      # O continue-on-error evita falhar caso seu repo não tenha permissão de escrita acidentalmente.
      # ==========================================
      - name: 🔐 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: 📤 Push Image
        run: |
          # GHCR exige que repositórios estejam em letras minúsculas
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ghcr.io/$REPO_LOWER/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ghcr.io/$REPO_LOWER/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        continue-on-error: true

      # ==========================================
      # ETAPA 3: DEPLOY (Target Local: Kind)
      # ==========================================
      - name: ☸️ Create k8s Kind Cluster
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: sre-cluster

      # Necessário para que o Kind consiga enxergar a imagem buildada localmente!
      - name: 🚀 Load Image to Kind
        run: kind load docker-image ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} --name sre-cluster

      - name: 🚀 Deploy to K8s
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: ✅ Verify Deployment
        run: |
          # Aguarda até que o deployment fique saudável
          kubectl rollout status deployment/sre-demo --timeout=90s
          
          # Imprime os recursos criados com sucesso
          kubectl get all