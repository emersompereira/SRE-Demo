kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  extraPortMappings:
  - containerPort: 30080
    hostPort: 8080
    listenAddress: "0.0.0.0" # App SRE-Demo
  - containerPort: 32000
    hostPort: 3000
    listenAddress: "0.0.0.0" # Grafana
  - containerPort: 32090
    hostPort: 9090
    listenAddress: "0.0.0.0" # Prometheus
  - containerPort: 32561
    hostPort: 5601
    listenAddress: "0.0.0.0" # Kibana